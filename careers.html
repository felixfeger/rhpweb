<!DOCTYPE html>
<html>
<head>
<title>Careers</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SAME HEADER -->

<div class="container">

<h1>Careers</h1>

<ul>
<li>Highway Patrol Officer</li>
<li>Federal Investigator</li>
<li>Correctional Officer</li>
</ul>

<button onclick="openModal()">Apply Now</button>

</div>

<div class="modal" id="popup">
<div class="modal-content">

<h2>Applications Closed</h2>
<p>We are not accepting applicants at this time.</p>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>
function openModal(){
document.getElementById("popup").style.display="flex";
}
function closeModal(){
document.getElementById("popup").style.display="none";
}
</script>

<footer>
<div class="footer-container">
<p>Official website of the Republic States Government.</p>
</div>
</footer>

</body>
</html>
